name: Build & Deploy (Coolify)

# Alur: push ke main → build 2 image (API + Streamlit) → push ke Docker Hub →
#       trigger redeploy 2 resource di Coolify lewat webhook.

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: emosense-api
            dockerfile: Dockerfile.api
          - image: emosense-streamlit
            dockerfile: Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Coolify deploy — API
        run: |
          curl --fail --request GET '${{ secrets.COOLIFY_WEBHOOK_API }}' \
            --header 'Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}'

      - name: Trigger Coolify deploy — Streamlit
        run: |
          curl --fail --request GET '${{ secrets.COOLIFY_WEBHOOK_STREAMLIT }}' \
            --header 'Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}'
